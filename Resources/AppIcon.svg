<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <!-- Flat mark: one glyph, two colours. Nothing here may become a gradient again. -->

  <!-- Apple squircle tile (radius 184 ≈ 0.2237·824). Near-white rather than #FFFFFF, with a hairline
       edge: the shadows were removed for flatness, so a pure white tile dissolves into a light
       Finder window or a Dock on a pale wallpaper. The border is what keeps its silhouette. -->
  <rect x="100" y="100" width="824" height="824" rx="184" ry="184" fill="#EFF1F7"/>
  <rect x="105" y="105" width="814" height="814" rx="179" ry="179"
        fill="none" stroke="#D0D4E4" stroke-width="10"/>

  <!-- Clipboard: board, then a tile-coloured notch, then the clip that sits in it.
       The notch is what keeps the clip readable at 16px — without it the two blue
       shapes fuse into one blob. Its 48px inset is the gap, ≈1.5px at 32px. -->
  <rect x="292" y="284" width="440" height="516" rx="88" fill="#5B6BF0"/>
  <rect x="364" y="176" width="296" height="196" rx="98" fill="#EFF1F7"/>
  <rect x="412" y="224" width="200" height="100" rx="50" fill="#5B6BF0"/>
</svg>
