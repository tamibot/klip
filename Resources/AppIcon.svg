<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <!-- Flat mark: one colour, one glyph. Nothing here may become a gradient again. -->

  <!-- Apple squircle tile (radius 184 ≈ 0.2237·824), centred on the 1024 grid -->
  <rect x="100" y="100" width="824" height="824" rx="184" ry="184" fill="#5B6BF0"/>

  <!-- Clipboard: board, then a tile-coloured notch, then the clip that sits in it.
       The notch is what keeps the clip readable at 16px — without it the two white
       shapes fuse into one blob. Its 48px inset is the gap, ≈1.5px at 32px. -->
  <rect x="292" y="284" width="440" height="516" rx="88" fill="#ffffff"/>
  <rect x="364" y="176" width="296" height="196" rx="98" fill="#5B6BF0"/>
  <rect x="412" y="224" width="200" height="100" rx="50" fill="#ffffff"/>
</svg>
