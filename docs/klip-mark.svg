<svg width="80" height="80" viewBox="100 100 824 824" xmlns="http://www.w3.org/2000/svg">
  <title>Klip</title>
  <!-- The app icon, cropped to the tile so it fills a README header at 80px.
       Same geometry as Resources/AppIcon.svg — keep the two in step.
       A tile-less version was tried and dropped: subtracting the notch from a
       single-colour glyph leaves pointed shoulders that read as a bag, not a
       clipboard. The white-on-blue glyph survives down to 16px. -->
  <rect x="100" y="100" width="824" height="824" rx="184" ry="184" fill="#5B6BF0"/>
  <rect x="292" y="284" width="440" height="516" rx="88" fill="#ffffff"/>
  <rect x="364" y="176" width="296" height="196" rx="98" fill="#5B6BF0"/>
  <rect x="412" y="224" width="200" height="100" rx="50" fill="#ffffff"/>
</svg>
